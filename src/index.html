<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaTeX OCR</title>
    <link rel="stylesheet" href="styles/katex.min.css" />
    <script src="js/katex.min.js" defer></script>
    <script src="js/p5.min.js" defer></script>
    <script src="js/line.js" defer></script>
    <script src="js/managers/canvasManager.js" defer></script>
    <script src="js/managers/imageManager.js" defer></script>
    <script src="js/managers/modelManager.js" defer></script>
    <script src="js/managers/manager.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/canvas.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>LaTeX OCR</h1>
      <div class="controls-container">
        <button id="switch-canvas" type="button">Canvas</button>
        <button id="switch-img" type="button">Image</button>
      </div>

      <div id="pic-container">
        <div id="convert-spinner"></div>
        <div id="canvas-container">
          <div id="canvas-actions">
            <button id="revert-btn" type="button" title="Undo">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 7v6h6" />
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
              </svg>
            </button>
            <button id="clear-btn" type="button" title="Clear">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M19 6l-1 14H6L5 6" />
              </svg>
            </button>
          </div>
        </div>
        <div id="img-container">
          <div id="spinner"></div>
          <p>Drag and drop, paste, or click to choose</p>
          <div id="preview"></div>
        </div>
      </div>
      <div class="controls-container">
        <select id="model-select"></select>
        <button id="api-key-btn" type="button" style="display: none">
          API Key
        </button>
        <button id="pix2text-model-btn" type="button" style="display: none">
          Download Model
        </button>
        <button id="convert-btn" type="button">Convert</button>
      </div>

      <div id="error-message" style="display: none"></div>

      <div id="download-modal" style="display: none">
        <div id="download-modal-box">
          <h3>Pix2Text Model Required</h3>
          <p id="download-modal-desc">
            The local model needs to be downloaded before use.
          </p>
          <div id="download-modal-progress" style="display: none">
            <div id="download-modal-bar-wrapper">
              <div id="download-modal-bar"></div>
            </div>
            <span id="download-modal-text"></span>
          </div>
          <div id="download-modal-actions">
            <button id="download-modal-btn" type="button">Download</button>
            <button id="download-modal-cancel" type="button">Cancel</button>
          </div>
        </div>
      </div>

      <div id="api-key-modal" style="display: none">
        <div id="api-key-modal-box">
          <h3>Gemini API Key</h3>
          <input
            type="password"
            id="api-key-input"
            placeholder="Enter your API key..."
          />
          <div id="api-key-modal-actions">
            <button id="api-key-save-btn" type="button">Save</button>
            <button id="api-key-close-btn" type="button">Cancel</button>
          </div>
        </div>
      </div>

      <input id="import-file-input" type="file" name="" value="" />

      <div id="result-container">
        <div id="latex-input-row">
          <textarea id="latex-input" readonly></textarea>
          <button id="copy-btn" type="button">Copy</button>
        </div>
        <div id="latex-preview"></div>
      </div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <link rel="stylesheet" href="styles/katex.min.css" />
    <script src="js/katex.min.js" defer></script>
    <script src="js/p5.min.js" defer></script>
    <script src="js/line.js" defer></script>
    <script src="js/managers/canvasManager.js" defer></script>
    <script src="js/managers/imageManager.js" defer></script>
    <script src="js/managers/modelManager.js" defer></script>
    <script src="js/managers/manager.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/canvas.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>Welcome to Tauri</h1>
      <div class="controls-container">
        <button id="switch-canvas" type="button">Canvas</button>
        <button id="switch-img" type="button">Image</button>
      </div>

      <div id="pic-container">
        <div id="canvas-container"></div>
        <div id="img-container">
          <div id="spinner"></div>
          <p>Drag and drop, paste, or click to choose</p>
          <div id="preview"></div>
        </div>
      </div>
      <div class="controls-container">
        <select id="model-select"></select>
        <button id="convert-btn" type="button">Convert</button>
      </div>
      <div id="delete-model-container">
        <button id="delete-model-btn" type="button">Delete Model</button>
      </div>
      <div id="download-progress-container">
        <progress id="download-progress" value="0" max="100"></progress>
        <span id="download-progress-label"></span>
        <span id="download-error"></span>
      </div>

      <input id="import-file-input" type="file" name="" value="" />

      <div id="result-container">
        <div id="latex-input-row">
          <textarea id="latex-input" readonly></textarea>
          <button id="copy-btn" type="button">Copy</button>
        </div>
        <div id="latex-preview"></div>
      </div>
    </main>
  </body>
</html>

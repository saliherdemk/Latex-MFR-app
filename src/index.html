<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script src="js/p5.min.js" defer></script>
    <script src="js/line.js" defer></script>
    <script src="js/canvasManager.js" defer></script>
    <script src="js/imageManager.js" defer></script>
    <script src="js/manager.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/canvas.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>Welcome to Tauri</h1>

      <div id="pic-container">
        <div id="canvas-container"></div>
        <div id="img-container">
          <div id="spinner"></div>
          <p>Drag and drop, paste, or click to choose</p>
          <div id="preview"></div>
        </div>
      </div>
      <div id="controls-container">
        <button id="switch-canvas" type="button">Canvas</button>
        <button id="switch-img" type="button">Image</button>
      </div>
      <input id="import-file-input" type="file" name="" value="" />
    </main>
  </body>
</html>
